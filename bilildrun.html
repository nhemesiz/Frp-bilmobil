<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bilek Güreşi Minigame</title>

<style>
body{
    margin:0;
    background:#1b1b1b;
    color:white;
    font-family:Arial;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
}

h1{
    margin-bottom:10px;
}

/* 🟦 PROGRESS BAR */
#barWrap{
    width:420px;
    height:18px;
    background:#333;
    border:2px solid #777;
    margin-bottom:15px;
    position:relative;
}

#barFill{
    height:100%;
    width:50%;
    background:#4caf50;
    transition:width 0.2s ease;
}

#status{
    font-size:24px;
    margin-bottom:10px;
}

canvas{
    background:#222;
    border-radius:12px;
}

/* 📱 MOBİL BUTON */
#tapBtn{
    margin-top:20px;
    width:200px;
    height:70px;
    font-size:24px;
    border:none;
    border-radius:12px;
    background:#4caf50;
    color:white;
    cursor:pointer;
}

#info{
    margin-top:15px;
    font-size:18px;
    text-align:center;
}
</style>
</head>

<body>

<h1>💪 BİLEK GÜREŞİ</h1>

<!-- 🟦 ADIM BAR -->
<div id="barWrap">
    <div id="barFill"></div>
</div>

<div id="status">SPACE'e bas / Dokun</div>

<canvas id="game" width="400" height="400"></canvas>

<!-- 📱 MOBİL BUTON -->
<button id="tapBtn">BAS</button>

<div id="info">
5 isabet = kazan<br>
-5 hata = kaybet
</div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const cx = canvas.width / 2;
const cy = canvas.height / 2;
const radius = 130;

/* ================= STATE ================= */

let angle = 0;
let power = 0;
let gameOver = false;

let greenCenter = Math.random() * Math.PI * 2;
const greenSize = 0.16;

/* ================= BAR ================= */

function updateBar(){
    const bar = document.getElementById("barFill");
    let percent = ((power + 5) / 10) * 100;
    bar.style.width = percent + "%";
}

/* ================= DRAW ================= */

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    /* circle */
    ctx.beginPath();
    ctx.arc(cx,cy,radius,0,Math.PI*2);
    ctx.lineWidth = 12;
    ctx.strokeStyle = "#666";
    ctx.stroke();

    /* green zone */
    ctx.beginPath();
    ctx.arc(
        cx,
        cy,
        radius,
        greenCenter - greenSize/2,
        greenCenter + greenSize/2
    );
    ctx.lineWidth = 14;
    ctx.strokeStyle = "lime";
    ctx.stroke();

    /* dot */
    const x = cx + Math.cos(angle)*radius;
    const y = cy + Math.sin(angle)*radius;

    ctx.beginPath();
    ctx.arc(x,y,10,0,Math.PI*2);
    ctx.fillStyle = "white";
    ctx.fill();

    requestAnimationFrame(draw);
}

/* ================= LOOP ================= */

function update(){
    if(gameOver) return;

    angle += 0.15;

    if(angle > Math.PI*2){
        angle -= Math.PI*2;
    }

    setTimeout(update,16);
}

/* ================= END ================= */

function win(){
    gameOver = true;
    document.getElementById("status").innerHTML = "🏆 KAZANDIN!";
}

function lose(){
    gameOver = true;
    document.getElementById("status").innerHTML = "💀 KAYBETTİN!";
}

/* ================= HIT ================= */

function hit(){

    if(gameOver) return;

    let diff = Math.atan2(
        Math.sin(angle - greenCenter),
        Math.cos(angle - greenCenter)
    );

    const success = Math.abs(diff) <= greenSize/2;

    if(success){
        power++;
        document.getElementById("status").innerHTML = "✅ İsabet!";
    }else{
        power--;
        document.getElementById("status").innerHTML = "❌ Kaçırdın!";
    }

    greenCenter = Math.random() * Math.PI * 2;

    updateBar();

    if(power >= 5) win();
    if(power <= -5) lose();
}

/* ================= INPUT ================= */

/* PC */
document.addEventListener("keydown",(e)=>{
    if(e.code === "Space"){
        e.preventDefault();
        hit();
    }
});

/* 📱 MOBİL BUTON */
document.getElementById("tapBtn").addEventListener("click", hit);

/* 📱 HER DOKUNUŞ (opsiyonel ekstra kontrol) */
document.addEventListener("touchstart",(e)=>{
    hit();
});

/* ================= START ================= */

updateBar();
draw();
update();

</script>

</body>
</html>
